<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/img/favicon.png" type="image/png">
<title>Demolar — Op. Dr. Çetin Duygu</title>
<style>
  :root{--bg:#fbf6ef;--card:#ffffff;--accent:#e8812e;--accent2:#f4a45c;--ink:#36312b;--muted:#9a8f82;--border:#f0e3d2}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 560px at 50% -8%,#fff6ea 0%,var(--bg) 60%);
    color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{width:100%;max-width:430px;text-align:center}
  .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:34px 26px 30px;
    box-shadow:0 18px 50px rgba(232,129,46,.12)}
  .logo{width:184px;max-width:78%;height:auto;margin:0 auto 20px;display:block}
  h1{font-size:24px;font-weight:700;margin-bottom:8px;color:var(--ink)}
  .sub{color:var(--muted);font-size:14.5px;margin-bottom:28px;line-height:1.55}
  .btns{display:flex;flex-direction:column;gap:13px}
  a.btn{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;
    padding:17px;border-radius:14px;font-size:16.5px;font-weight:650;transition:transform .12s,box-shadow .12s}
  a.btn:hover{transform:translateY(-2px)}
  .wa{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 10px 24px rgba(232,129,46,.32)}
  .wa:hover{box-shadow:0 14px 30px rgba(232,129,46,.42)}
  .ses{background:#fff;color:var(--accent);border:2px solid var(--accent)}
  .ses:hover{background:#fff7ef}
  .foot{margin-top:24px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="/img/logo.png" alt="asistan 7/24">
      <h1>Demolar</h1>
      <p class="sub">Op. Dr. Çetin Duygu<br>Plastik, Estetik ve Rekonstrüktif Cerrahi — Nişantaşı</p>
      <div class="btns">
        <a class="btn wa" href="/cetin-duygu/whatsapp-demo">💬 WhatsApp Demo</a>
        <a class="btn ses" href="/cetin-duygu/ses-demo">🎙️ Ses Demo</a>
      </div>
    </div>
    <div class="foot">asistan 7/24 · Dijital Asistan Demo</div>
  </div>
</body>
</html>
