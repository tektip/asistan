<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Demolar</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--accent:#14b8a6;--accent2:#0ea5e9;--text:#e2e8f0;--muted:#94a3b8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#13314a 0%,var(--bg) 60%);
    color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{width:100%;max-width:440px;text-align:center}
  .logo{width:56px;height:56px;border-radius:16px;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px}
  h1{font-size:28px;font-weight:700;margin-bottom:6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:32px;line-height:1.5}
  .btns{display:flex;flex-direction:column;gap:14px}
  a.btn{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;
    padding:18px;border-radius:14px;font-size:17px;font-weight:600;color:#fff;transition:transform .12s,box-shadow .12s}
  a.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .wa{background:linear-gradient(135deg,#25d366,#128c7e)}
  .ses{background:linear-gradient(135deg,var(--accent2),#2563eb)}
  .foot{margin-top:28px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">✨</div>
    <h1>Demolar</h1>
    <p class="sub">Op. Dr. Çetin Duygu<br>Plastik, Estetik ve Rekonstrüktif Cerrahi — Nişantaşı</p>
    <div class="btns">
      <a class="btn wa" href="whatsapp-demo.html">💬 WhatsApp Demo</a>
      <a class="btn ses" href="ses-demo.html">🎙️ Ses Demo</a>
    </div>
    <div class="foot">Dijital Asistan Demo</div>
  </div>
</body>
</html>
